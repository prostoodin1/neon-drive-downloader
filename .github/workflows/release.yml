name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Test progress parser
        run: python -m unittest discover -s tests

      - name: Build EXE
        run: python -m PyInstaller --noconfirm --clean NeonDriveDownloader.spec

      - name: Verify artifact
        shell: pwsh
        run: |
          $file = Get-Item "dist\NeonDriveDownloader.exe"
          if ($file.Length -lt 1000000) { throw "Release artifact is unexpectedly small" }
          Get-FileHash $file.FullName -Algorithm SHA256

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          "dist\NeonDriveDownloader.exe"
          --title "Neon Drive Downloader ${{ github.ref_name }}"
          --generate-notes
