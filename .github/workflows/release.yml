name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Test progress parser
        run: python -m unittest discover -s tests

      - name: Build installed and compatibility applications
        run: |
          python -m PyInstaller --noconfirm --clean NeonDriveDownloader.spec
          python -m PyInstaller --noconfirm --clean NeonDriveDownloader-OneFile.spec

      - name: Package portable ZIP
        shell: pwsh
        run: |
          Copy-Item "dist\NeonDriveDownloader-Legacy.exe" "dist\NeonDriveDownloader.exe" -Force
          Compress-Archive -Path "dist\NeonDriveDownloader\*" `
            -DestinationPath "dist\NeonDriveDownloader-Portable.zip" -CompressionLevel Optimal

      - name: Build installer without onefile extraction
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $version = "${{ github.ref_name }}".TrimStart("v")
          $versionParts = @(
            [regex]::Matches($version, "\d+") |
              Select-Object -First 4 |
              ForEach-Object { $_.Value }
          )
          while ($versionParts.Count -lt 4) { $versionParts += "0" }
          $fileVersion = $versionParts -join "."
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=$version" "/DMyAppFileVersion=$fileVersion" "installer.iss"

      - name: Verify artifact
        shell: pwsh
        run: |
          $files = @(
            "dist\NeonDriveDownloader-Setup.exe",
            "dist\NeonDriveDownloader-Portable.zip",
            "dist\NeonDriveDownloader.exe"
          )
          foreach($path in $files) {
            $file = Get-Item $path
            if ($file.Length -lt 1000000) { throw "$path is unexpectedly small" }
            Get-FileHash $file.FullName -Algorithm SHA256
          }

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $arguments = @(
            "release", "create", $tag,
            "dist\NeonDriveDownloader-Setup.exe",
            "dist\NeonDriveDownloader-Portable.zip",
            "dist\NeonDriveDownloader.exe",
            "--title", "Neon Drive Downloader $tag",
            "--generate-notes"
          )
          if ($tag.Contains("-")) { $arguments += "--prerelease" }
          & gh @arguments
